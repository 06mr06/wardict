name: lugorena
description: LUGORENA - Kelime Düello Oyunu
publish_to: 'none'

version: 1.0.0+5

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  provider: ^6.1.2
  shared_preferences: ^2.2.2
  share_plus: ^7.2.2
  path_provider: ^2.1.5
  confetti: ^0.8.0
  firebase_core: ^4.5.0
  firebase_auth: ^6.1.3
  cloud_firestore: ^6.1.1
  google_sign_in: ^6.2.1
  package_info_plus: ^9.0.0
  google_mobile_ads: ^7.0.0
  in_app_purchase: ^3.2.3
  audioplayers: ^6.5.1
  connectivity_plus: ^6.0.3
  google_fonts: ^6.2.1
  flutter_dotenv: ^5.1.0
  intl: ^0.20.2
  image_picker: ^1.2.1
  firebase_storage: ^13.1.0
  firebase_messaging: ^16.1.2
  flutter_local_notifications: ^18.0.1
  firebase_database: ^12.1.4
  cloud_functions: ^6.0.7
  firebase_app_check: ^0.4.1
  firebase_analytics: ^12.0.1
  firebase_crashlytics: ^5.0.1
  flutter_tts: ^4.2.5
  lottie: ^3.3.2
  video_player: ^2.9.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4
  image: ^4.8.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#1A3A5C"
  adaptive_icon_foreground: "assets/images/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/images/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/images/avatars/
    - assets/images/badges/
    - assets/data/
    - assets/animations/
    - assets/sounds/
